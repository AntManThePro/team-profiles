<html lang="en">

            padding: 0;

            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            z-index: 0;
        }
        .container {
            width: 100%;
            max-width: 900px;
            position: relative;
            z-index: 1;
        }
        .header {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .header h1 {
            color: #10b981;
            font-size: 2.2em;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(16, 185, 129, 0.3);
        }
        .header .credit {
            color: #94a3b8;
            font-size: 0.9em;
            font-style: italic;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .header-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .data-controls {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        button:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
        }
        button:active {
            transform: translateY(0);
        }
        .btn-delete {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4);
        }
        .btn-delete:hover {
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
            box-shadow: 0 6px 20px rgba(244, 63, 94, 0.5);
        }
        .btn-edit {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.4);
        }
        .btn-edit:hover {
            background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.5);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
            box-shadow: 0 4px 15px rgba(100, 116, 139, 0.4);
        }
        .btn-secondary:hover {
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            box-shadow: 0 6px 20px rgba(100, 116, 139, 0.5);
        }
        .btn-export {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        .btn-export:hover {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
        }
        .btn-import {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }
        .btn-import:hover {
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.5);
        }
        .btn-clear {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }
        .btn-clear:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
        }
        input[type="file"] {
            display: none;
        }
        #profile-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .profile-card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
        }
        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.3);
        }
        .profile-card h3 {
            margin: 0 0 15px 0;
            color: #10b981;
            font-size: 1.3em;
        }
        .profile-card p {
            color: #cbd5e1;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .profile-card strong {
            color: #94a3b8;
        }
        .profile-card .actions {
            margin-top: auto;
            padding-top: 15px;
            display: flex;
            gap: 10px;
        }
        #profile-form-view {
            display: none;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(148, 163, 184, 0.1);

        h2 {
            color: #10b981;
            margin-bottom: 25px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, textarea {
            padding: 12px;

            border-radius: 8px;
            font-size: 14px;
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            color: #e5e7eb;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .status-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background: rgba(16, 185, 129, 0.95);
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }
        .status-message.show {
            opacity: 1;
            transform: translateY(0);
        }
        .status-message.error {
            background: rgba(239, 68, 68, 0.95);
        }
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

</head>
<body>
<div class="container">
    <div class="header">
        <h1>Team Profile Builder</h1>
        <div class="credit">By: A.L.A.</div>
        <div class="header-buttons">
            <button id="add-new-btn">Add New Profile</button>
        </div>
        <div class="data-controls">
            <button id="export-btn" class="btn-export">📥 Export Data</button>
            <button id="import-btn" class="btn-import">📤 Import Data</button>
            <button id="clear-btn" class="btn-clear">🗑️ Clear All</button>
            <input type="file" id="import-file" accept=".json">
        </div>
    </div>
    <div id="profile-list-view">
        <div id="profile-list"></div>
    </div>
    <div id="profile-form-view">
        <h2 id="form-title">Add New Profile</h2>
        <form id="profile-form">
            <input type="hidden" id="profile-id">
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="role">Role/Title</label>
                    <input type="text" id="role">
                </div>
                <div class="form-group full-width">
                    <label for="key_responsibilities">Key Responsibilities</label>
                    <textarea id="key_responsibilities"></textarea>
                </div>
                <div class="form-group">
                    <label for="communicates_better_via">Communicates Better Via</label>
                    <input type="text" id="communicates_better_via">
                </div>
                <div class="form-group">
                    <label for="communication_style">Communication Style</label>
                    <input type="text" id="communication_style">
                </div>
                <div class="form-group">
                    <label for="responsiveness">Responsiveness</label>
                    <input type="text" id="responsiveness">
                </div>
                <div class="form-group">
                    <label for="works_best_when">Works Best When</label>
                    <textarea id="works_best_when"></textarea>
                </div>
                <div class="form-group full-width">
                    <label for="struggles_with">Struggles With</label>
                    <textarea id="struggles_with"></textarea>
                </div>
                <div class="form-group">
                    <label for="agent_responsiveness">Agent Responsiveness</label>
                    <input type="text" id="agent_responsiveness">
                </div>
                <div class="form-group">
                    <label for="strengths">Strengths</label>
                    <input type="text" id="strengths">
                </div>
                <div class="form-group">
                    <label for="development_areas">Development Areas</label>
                    <input type="text" id="development_areas">
                </div>
                <div class="form-group">
                    <label for="reminders_via">Reminders Via</label>
                    <input type="text" id="reminders_via">
                </div>
                <div class="form-group">
                    <label for="if_task_delayed">If Task is Delayed</label>
                    <input type="text" id="if_task_delayed">
                </div>
                <div class="form-group">
                    <label for="personality_type">Personality Type</label>
                    <input type="text" id="personality_type">
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
                    <button type="submit">Save Profile</button>
                </div>
            </div>
        </form>
    </div>
</div>
<div id="status-message" class="status-message"></div>

                }
            } else {
                profiles = [...defaultProfiles];
                saveProfiles();
            }
        }
        function saveProfiles() {
            localStorage.setItem('teamProfiles', JSON.stringify(profiles));
        }
        function showStatus(message, isError = false) {
            statusMessage.textContent = message;
            statusMessage.className = 'status-message show' + (isError ? ' error' : '');
            setTimeout(() => {
                statusMessage.classList.remove('show');
            }, 3000);
        }
        function renderProfiles() {
            profileList.innerHTML = '';
            profiles.forEach(profile => {
                const card = document.createElement('div');
                card.className = 'profile-card';
                card.innerHTML = `
                    <h3>${profile.name}</h3>
                    <p><strong>Role:</strong> ${profile.role || 'N/A'}</p>
                    <p><strong>Strengths:</strong> ${profile.strengths || 'N/A'}</p>
                    <p><strong>Development Areas:</strong> ${profile.development_areas || 'N/A'}</p>
                    <div class="actions">
                        <button class="btn-edit" data-id="${profile.id}">Edit</button>
                        <button class="btn-delete" data-id="${profile.id}">Delete</button>
                    </div>
                `;
                profileList.appendChild(card);
            });
        }
        function showForm(profile) {
            profileListView.style.display = 'none';
            addNewBtn.parentElement.style.display = 'none';
            document.querySelector('.data-controls').style.display = 'none';
            profileFormView.style.display = 'block';
            if (profile) {
                formTitle.textContent = 'Edit Profile';
                profileIdInput.value = profile.id;
                document.getElementById('name').value = profile.name || '';
                document.getElementById('role').value = profile.role || '';
                document.getElementById('key_responsibilities').value = profile.key_responsibilities || '';
                document.getElementById('communicates_better_via').value = profile.communicates_better_via || '';
                document.getElementById('communication_style').value = profile.communication_style || '';
                document.getElementById('responsiveness').value = profile.responsiveness || '';
                document.getElementById('works_best_when').value = profile.works_best_when || '';
                document.getElementById('struggles_with').value = profile.struggles_with || '';
                document.getElementById('agent_responsiveness').value = profile.agent_responsiveness || '';
                document.getElementById('strengths').value = profile.strengths || '';
                document.getElementById('development_areas').value = profile.development_areas || '';
                document.getElementById('reminders_via').value = profile.reminders_via || '';
                document.getElementById('if_task_delayed').value = profile.if_task_delayed || '';
                document.getElementById('personality_type').value = profile.personality_type || '';
            } else {
                formTitle.textContent = 'Add New Profile';
                profileForm.reset();
                profileIdInput.value = '';
            }
        }
        function hideForm() {
            profileFormView.style.display = 'none';
            profileListView.style.display = 'block';
            addNewBtn.parentElement.style.display = 'flex';
            document.querySelector('.data-controls').style.display = 'flex';
        }
        exportBtn.addEventListener('click', () => {
            const dataStr = JSON.stringify(profiles, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `team-profiles-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
            showStatus('Profiles exported successfully!', false);
        });
        importBtn.addEventListener('click', () => {
            importFile.click();
        });
        importFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedProfiles = JSON.parse(event.target.result);
                        if (Array.isArray(importedProfiles)) {
                            profiles = importedProfiles;
                            saveProfiles();
                            renderProfiles();
                            showStatus('Profiles imported successfully!', false);
                        } else {
                            showStatus('Invalid file format', true);
                        }
                    } catch (error) {
                        showStatus('Error reading file', true);
                    }
                };
                reader.readAsText(file);
            }
            e.target.value = '';
        });
        clearBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to clear all profiles? This will reset to default profiles.')) {
                profiles = [...defaultProfiles];
                saveProfiles();
                renderProfiles();
                showStatus('Profiles reset to defaults', false);
            }
        });
        addNewBtn.addEventListener('click', () => showForm());
        cancelBtn.addEventListener('click', hideForm);
        profileForm.addEventListener('submit', e => {
            e.preventDefault();
            const id = profileIdInput.value;
            const profileData = {
                name: document.getElementById('name').value,
                role: document.getElementById('role').value,
                key_responsibilities: document.getElementById('key_responsibilities').value,
                communicates_better_via: document.getElementById('communicates_better_via').value,
                communication_style: document.getElementById('communication_style').value,
                responsiveness: document.getElementById('responsiveness').value,
                works_best_when: document.getElementById('works_best_when').value,
                struggles_with: document.getElementById('struggles_with').value,
                agent_responsiveness: document.getElementById('agent_responsiveness').value,
                strengths: document.getElementById('strengths').value,
                development_areas: document.getElementById('development_areas').value,
                reminders_via: document.getElementById('reminders_via').value,
                if_task_delayed: document.getElementById('if_task_delayed').value,
                personality_type: document.getElementById('personality_type').value
            };
            if (id) {
                const index = profiles.findIndex(p => p.id == id);
                profiles[index] = { ...profiles[index], ...profileData, id: parseInt(id) };
                showStatus('Profile updated!', false);
            } else {
                profileData.id = profiles.length > 0 ? Math.max(...profiles.map(p => p.id)) + 1 : 1;
                profiles.push(profileData);
                showStatus('Profile added!', false);
            }
            saveProfiles();
            renderProfiles();
            hideForm();
        });
        profileList.addEventListener('click', e => {
            if (e.target.classList.contains('btn-edit')) {
                const id = e.target.dataset.id;
                const profile = profiles.find(p => p.id == id);
                showForm(profile);
            }
            if (e.target.classList.contains('btn-delete')) {
                const id = e.target.dataset.id;
                if (confirm('Are you sure you want to delete this profile?')) {
                    profiles = profiles.filter(p => p.id != id);
                    saveProfiles();
                    renderProfiles();
                    showStatus('Profile deleted', false);
                }
            }
        });
        loadProfiles();
        renderProfiles();
    });
</script>
</body>
</html>
